<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title id="seo-title">Digital Business Card | Goyoga Tallinn</title>
    <meta name="description" id="seo-description" content="Connect with our yoga teachers at Goyoga Tallinn. Save contact details and book classes instantly." />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&subset=latin,cyrillic&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Roboto+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/style.css">

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/assets/branding/logo-goyoga-tallinn-estonia.ico">
    
    <style>
        :root {
            --brand-pink: #ec4899;
            --brand-dark: #282420;
            --bg-light: #FAF9F6;
        }

        body {
            background-color: var(--bg-light);
            background-image: 
                radial-gradient(at 0% 0%, rgba(236, 72, 153, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.05) 0px, transparent 50%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: var(--brand-dark);
            -webkit-font-smoothing: antialiased;
        }

        .card-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            padding: 0 0 100px 0; /* Space for sticky button */
        }

        .main-card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            margin-top: 80px;
            position: relative;
            z-index: 10;
        }

        .profile-header {
            height: 140px;
            background: linear-gradient(135deg, #ec4899 0%, #be185d 100%);
            border-radius: 2rem 2rem 0 0;
            position: relative;
        }

        .profile-img-container {
            position: absolute;
            bottom: -70px;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
        }

        .info-item {
            display: flex;
            align-items: center;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid rgba(0,0,0,0.03);
            transition: background-color 0.2s;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-item:active {
            background-color: #f9fafb;
        }

        .icon-box {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F05A5A; /* Warm reddish-pink from Blinq reference */
            border-radius: 50%;
            color: white;
            flex-shrink: 0;
            margin-right: 1rem;
        }

        .sticky-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem;
            background: linear-gradient(to top, var(--bg-light) 80%, transparent);
            z-index: 50;
            display: flex;
            justify-content: center;
        }

        .save-button {
            background: #F05A5A;
            color: white;
            padding: 1rem 3rem;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 1.125rem;
            box-shadow: 0 10px 15px -3px rgba(240, 90, 90, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
            max-width: 320px;
            justify-content: center;
        }

        .save-button:active {
            transform: scale(0.96);
        }

        .qr-section {
            padding: 2.5rem 1.5rem;
            border-top: 8px solid var(--bg-light);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Animation */
        .fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>

<body>
    <main class="card-container">
        <!-- Main Card Decoration -->
        <div class="main-card fade-in-up">
            <div class="profile-header">
                <div class="profile-img-container">
                    <img id="teacher-image" src="" alt="Teacher" class="profile-img">
                </div>
            </div>

            <!-- Identity Section -->
            <div class="pt-24 pb-6 text-center px-6">
                <h1 id="teacher-name" class="text-3xl font-bold text-gray-900 tracking-tight">Teacher Name</h1>
                <p id="teacher-role" class="text-gray-500 font-medium text-lg mt-1">Role / Specialization</p>
                
                <!-- Quick Social Icons Row -->
                <div class="flex items-center justify-center gap-3 mt-6">
                    <a id="icon-instagram" href="#" class="w-10 h-10 flex items-center justify-center bg-gray-50 rounded-full text-pink-600 shadow-sm border border-gray-100 hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
                    </a>
                    <a id="icon-website" href="#" class="w-10 h-10 flex items-center justify-center bg-gray-50 rounded-full text-pink-600 shadow-sm border border-gray-100 hidden">
                        <i data-lucide="globe" class="w-5 h-5"></i>
                    </a>
                    <a id="icon-email" href="#" class="w-10 h-10 flex items-center justify-center bg-gray-50 rounded-full text-pink-600 shadow-sm border border-gray-100 hidden">
                        <i data-lucide="mail" class="w-5 h-5"></i>
                    </a>
                </div>

                <div class="flex flex-col items-center justify-center gap-3 mt-8 opacity-80">
                    <img src="/assets/branding/logo-goyoga-tallinn-estonia.svg" alt="Goyoga" class="h-8 md:h-10 w-auto">
                    <span class="text-gray-700 font-bold text-xs md:text-sm tracking-[0.25em] uppercase">Goyoga Tallinn</span>
                </div>
            </div>

            <!-- Contact List Section -->
            <div class="mt-4">
                <a id="item-phone" href="#" class="info-item">
                    <div class="icon-box">
                        <i data-lucide="phone" class="w-5 h-5"></i>
                    </div>
                    <div class="flex flex-col">
                        <span id="val-phone" class="font-bold text-gray-900 leading-tight">...</span>
                        <span class="text-xs text-gray-400 font-medium mt-0.5" data-i18n="card.label.work">Work</span>
                    </div>
                </a>

                <a id="item-email" href="#" class="info-item">
                    <div class="icon-box">
                        <i data-lucide="mail" class="w-5 h-5"></i>
                    </div>
                    <div class="flex flex-col">
                        <span id="val-email" class="font-bold text-gray-900 leading-tight">...</span>
                        <span class="text-xs text-gray-400 font-medium mt-0.5" data-i18n="card.label.work">Work</span>
                    </div>
                </a>

                <div class="info-item">
                    <div class="icon-box">
                        <i data-lucide="map-pin" class="w-5 h-5"></i>
                    </div>
                    <div class="flex flex-col">
                        <span class="font-bold text-gray-900 leading-tight" data-i18n="card.location">Narva mnt 7D, Tallinn</span>
                        <span class="text-xs text-gray-400 font-medium mt-0.5" data-i18n="card.label.studio">Studio Address</span>
                    </div>
                </div>

                <a id="item-website" href="#" class="info-item">
                    <div class="icon-box">
                        <i data-lucide="globe" class="w-5 h-5"></i>
                    </div>
                    <div class="flex flex-col">
                        <span id="val-website" class="font-bold text-gray-900 leading-tight">...</span>
                        <span class="text-xs text-gray-400 font-medium mt-0.5" data-i18n="card.label.website">Official Site</span>
                    </div>
                </a>

                <a id="item-instagram" href="#" class="info-item">
                    <div class="icon-box">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
                    </div>
                    <div class="flex flex-col">
                        <span id="val-instagram" class="font-bold text-gray-900 leading-tight">...</span>
                        <span class="text-xs text-gray-400 font-medium mt-0.5" data-i18n="card.label.instagram">Instagram</span>
                    </div>
                </a>
            </div>

            <!-- QR Code Section -->
            <div class="qr-section">
                <div class="bg-gray-50 p-6 rounded-3xl border border-gray-100 shadow-inner">
                    <img id="qr-code-img" src="" alt="Scan Me" class="w-40 h-40">
                </div>
                <p class="text-sm text-gray-400 font-medium mt-6 text-center px-8" data-i18n="card.qr_instructions">Point your camera at the screen to instantly open this digital business card on your phone.</p>
            </div>

            <div class="py-8 border-t border-gray-50 text-center">
                <a id="teacher-profile-link" href="#" class="inline-flex items-center text-gray-400 hover:text-pink-500 font-medium text-sm transition-colors group">
                    <span data-i18n="card.view_biography">Full Biography</span>
                    <i data-lucide="chevron-right" class="w-4 h-4 ml-1 group-hover:translate-x-1 transition-transform"></i>
                </a>
            </div>
        </div>

        <footer class="mt-8 opacity-20 text-[10px] font-bold tracking-[0.2em] uppercase text-gray-800 text-center mb-12">
            © 2026 Goyoga Estonia OÜ
        </footer>
    </main>

    <!-- Sticky Footer CTA -->
    <div class="sticky-footer fade-in-up" style="animation-delay: 400ms;">
        <button id="save-contact-btn" class="save-button">
            <i data-lucide="user-plus" class="w-6 h-6"></i>
            <span data-i18n="card.save_contact">Save Contact</span>
        </button>
    </div>

    <!-- Scripts -->
    <script src="/js/data.js?v=1775707269"></script>
    <script src="/js/card-page.js?v=1775707274"></script>
    <script src="/js/card-vcard.js?v=1775707269"></script>
</body>

</html>

</html>

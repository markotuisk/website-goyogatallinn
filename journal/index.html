<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="seo-title">The Journal | Wellness Insights | Goyoga Tallinn</title>
    <meta name="description" content="Explore deep insights on yoga, meditation, and holistic health. The Goyoga Journal is your guide to authentic wellness in Tallinn." name="description"/>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="/css/style.css" rel="stylesheet"/>
    
    <!-- Favicons -->
    <link href="/assets/branding/logo-goyoga-tallinn-estonia.ico" rel="icon" type="image/x-icon"/>
    
    <!-- Data Files -->
    <script src="/js/data.js"></script>
    <script src="/js/seo-data.js"></script>
    <script src="/js/journal-data.js"></script>
</head>

<body class="bg-stone-50 text-gray-800 antialiased font-sans">
    
    <!-- Navigation Header (Synchronized with main site) -->
    <header class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md shadow-sm" id="navbar">
        <div class="container-custom py-4">
            <div class="flex items-center justify-between">
                <a class="flex items-center" href="/">
                    <img alt="Goyoga Tallinn" class="h-10 w-auto" src="/assets/branding/logo-goyoga-tallinn-estonia.svg">
                </a>
                <nav class="hidden md:block">
                    <ul class="flex items-center space-x-8">
                        <li><a class="text-sm font-medium hover:text-pink-600 transition-colors" href="/" data-i18n="nav.home">Home</a></li>
                        <li><a class="text-sm font-medium hover:text-pink-600 transition-colors" href="/#classes" data-i18n="nav.classes">Classes</a></li>
                        <li><a class="text-sm font-medium hover:text-pink-600 transition-colors" href="/#schedule" data-i18n="nav.schedule">Schedule</a></li>
                        <li><a class="text-sm font-medium hover:text-pink-600 transition-colors" href="/events.html" data-i18n="nav.events">Events</a></li>
                        <li><a class="text-sm font-medium text-pink-600" href="/journal/" data-i18n="nav.journal">Journal</a></li>
                        <li><a class="text-sm font-medium hover:text-pink-600 transition-colors" href="/#contact" data-i18n="nav.contact">Contact</a></li>
                        <!-- Language Switcher -->
                        <li class="language-switcher ml-4">
                            <button class="flex items-center gap-2 text-sm font-medium" id="language-toggle">
                                <span class="language-flag-container">
                                    <img alt="English" class="language-flag" id="current-flag" src="https://flagcdn.com/w20/gb.png" title="English"/>
                                </span>
                                <span id="current-language">EN</span>
                                <i class="h-4 w-4" data-lucide="chevron-down"></i>
                            </button>
                            <div class="language-dropdown" id="language-dropdown">
                                <div class="language-option active" data-lang="en">
                                    <img alt="English" class="language-flag" src="https://flagcdn.com/w20/gb.png" title="English"/>
                                    <span>English</span>
                                </div>
                                <div class="language-option" data-lang="et">
                                    <img alt="Eesti" class="language-flag" src="https://flagcdn.com/w20/ee.png" title="Eesti"/>
                                    <span>Eesti</span>
                                </div>
                                <div class="language-option" data-lang="fi">
                                    <img alt="Suomi" class="language-flag" src="https://flagcdn.com/w20/fi.png" title="Suomi"/>
                                    <span>Suomi</span>
                                </div>
                                <div class="language-option" data-lang="ru">
                                    <img alt="Русский" class="language-flag" src="https://flagcdn.com/w20/ru.png" title="Русский">
                                    <span>Русский</span>
                                </div>
                            </div>
                        </li>
                    </ul>
                </nav>
                <div class="flex items-center gap-4">
                    <!-- Mobile Language Switcher -->
                    <div class="language-switcher md:hidden">
                        <button class="flex items-center gap-2 text-sm font-medium" id="mobile-language-toggle">
                            <img alt="English" class="language-flag" id="mobile-current-flag" src="https://flagcdn.com/w20/gb.png" title="English"/>
                            <span id="mobile-current-language">EN</span>
                        </button>
                        <div class="language-dropdown" id="mobile-language-dropdown">
                            <div class="language-option-mobile active" data-lang="en">
                                <img alt="English" class="language-flag" src="https://flagcdn.com/w20/gb.png" title="English"/>
                                <span>English</span>
                            </div>
                            <div class="language-option-mobile" data-lang="et">
                                <img alt="Eesti" class="language-flag" src="https://flagcdn.com/w20/ee.png" title="Eesti"/>
                                <span>Eesti</span>
                            </div>
                            <div class="language-option-mobile" data-lang="fi">
                                <img alt="Suomi" class="language-flag" src="https://flagcdn.com/w20/fi.png" title="Suomi"/>
                                <span>Suomi</span>
                            </div>
                            <div class="language-option-mobile" data-lang="ru">
                                <img alt="Русский" class="language-flag" src="https://flagcdn.com/w20/ru.png" title="Русский">
                                <span>Русский</span>
                            </div>
                        </div>
                    </div>
                    <!-- Mobile Menu Button -->
                    <button class="md:hidden text-gray-800" id="menu-toggle">
                        <i data-lucide="menu" class="h-6 w-6"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Mobile Menu Container (for consistency) -->
    <div class="fixed inset-0 z-50 bg-white transform translate-x-full transition-transform duration-300 ease-in-out md:hidden overflow-y-auto" id="mobile-menu">
        <div class="flex justify-end p-4">
            <button class="focus:outline-none" id="menu-close">
                <i class="h-6 w-6" data-lucide="x"></i>
            </button>
        </div>
        <div class="flex flex-col h-full justify-center items-center space-y-8 p-8">
            <a class="mobile-link text-xl font-medium" href="/" data-i18n="nav.home">Home</a>
            <a class="mobile-link text-xl font-medium" href="/#classes" data-i18n="nav.classes">Classes</a>
            <a class="mobile-link text-xl font-medium" href="/#schedule" data-i18n="nav.schedule">Schedule</a>
            <a class="mobile-link text-xl font-medium" href="/events.html" data-i18n="nav.events">Events</a>
            <a class="mobile-link text-xl font-medium text-pink-600" href="/journal/" data-i18n="nav.journal">Journal</a>
            <a class="mobile-link text-xl font-medium" href="/#contact" data-i18n="nav.contact">Contact</a>
            
            <!-- Mobile Language Options in Menu -->
            <div class="flex flex-col gap-4 mt-8 border-t pt-8 w-full">
                <div class="text-center mb-2 text-gray-500 font-medium" data-i18n="nav.language">Language</div>
                <div class="flex flex-wrap justify-center gap-3">
                    <button class="language-option-mobile flex items-center gap-2 px-4 py-2 rounded-lg border active" data-lang="en">
                        <img alt="English" class="language-flag" src="https://flagcdn.com/w20/gb.png" title="English"/>
                        <span>English</span>
                    </button>
                    <button class="language-option-mobile flex items-center gap-2 px-4 py-2 rounded-lg border" data-lang="et">
                        <img alt="Eesti" class="language-flag" src="https://flagcdn.com/w20/ee.png" title="Eesti"/>
                        <span>Eesti</span>
                    </button>
                    <button class="language-option-mobile flex items-center gap-2 px-4 py-2 rounded-lg border" data-lang="fi">
                        <img alt="Suomi" class="language-flag" src="https://flagcdn.com/w20/fi.png" title="Suomi"/>
                        <span>Suomi</span>
                    </button>
                    <button class="language-option-mobile flex items-center gap-2 px-4 py-2 rounded-lg border" data-lang="ru">
                        <img alt="Русский" class="language-flag" src="https://flagcdn.com/w20/ru.png" title="Русский">
                        <span>Русский</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <main class="pt-32 pb-24">
        <!-- Hero / Featured Article -->
        <div class="container-custom mb-20 animate-fade-in" id="featured-article-container">
            <!-- Dynamically Injected Heightened Hero -->
        </div>

        <!-- Article Grid -->
        <div class="container-custom grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12" id="article-grid">
            <!-- Dynamically Injected Article Cards -->
        </div>
    </main>

    <!-- Footer (Synchronized with main site) -->
    <footer class="bg-gray-800 text-white pt-20 pb-10">
        <div class="container-custom text-center">
            <img alt="Goyoga Tallinn" class="h-12 w-auto mx-auto mb-8 brightness-0 invert" src="/assets/branding/logo-goyoga-tallinn-estonia.svg">
            <p class="text-gray-400 max-w-md mx-auto mb-10" data-i18n="footer.description">Estonia's leading yoga and wellness sanctuary.</p>
            <div class="border-t border-gray-700 pt-8 text-sm text-gray-500">
                <p data-i18n="footer.copyright">© 2026 Goyoga Estonia OÜ. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="/js/script.js"></script>
    <script>
        function renderJournal() {
            // Use the language set by script.js initLanguage()
            const currentLang = window.currentLanguage || document.documentElement.lang || 'en';
            const grid = document.getElementById('article-grid');
            const featured = document.getElementById('featured-article-container');
            
            if (!window.journalData) return;
            
            const articles = window.journalData.articles;
            
            // 1. Render Featured (First Article)
            const first = articles[0];
            const firstTrans = first.translations[currentLang] || first.translations['en'];
            
            featured.innerHTML = `
                <div class="relative rounded-[2.5rem] overflow-hidden group cursor-pointer shadow-2xl h-[500px] lg:h-[600px] bg-stone-900">
                    <img src="${first.image}" class="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:scale-105 transition-transform duration-[2s]" />
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
                    <div class="absolute bottom-0 left-0 p-8 md:p-16 max-w-4xl">
                        <span class="inline-block px-4 py-1.5 bg-pink-600 text-white text-[10px] font-bold tracking-[0.2em] uppercase rounded-full mb-6">${first.category[currentLang] || first.category['en']}</span>
                        <h1 class="text-4xl md:text-6xl font-serif font-medium text-white mb-6 leading-tight">${firstTrans.title}</h1>
                        <p class="text-xl text-gray-200 mb-8 line-clamp-2">${firstTrans.excerpt}</p>
                        <div class="flex items-center gap-4 text-white/80 text-sm italic">
                            <span>${first.author}</span>
                            <span>•</span>
                            <span>${first.readTime[currentLang] || first.readTime['en']}</span>
                        </div>
                    </div>
                </div>
            `;

            // 2. Render Grid (Rest of Articles)
            grid.innerHTML = '';
            articles.slice(1).forEach(article => {
                const trans = article.translations[currentLang] || article.translations['en'];
                const card = document.createElement('div');
                card.className = "group cursor-pointer";
                card.innerHTML = `
                    <div class="rounded-[2rem] overflow-hidden mb-6 aspect-[4/5] bg-stone-200">
                        <img src="${article.image}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                    </div>
                    <span class="text-[10px] font-bold tracking-[0.2em] uppercase text-pink-600 mb-3 block">${article.category[currentLang] || article.category['en']}</span>
                    <h3 class="text-2xl font-serif font-medium mb-4 group-hover:text-pink-600 transition-colors">${trans.title}</h3>
                    <p class="text-gray-500 line-clamp-3 mb-6">${trans.excerpt}</p>
                    <div class="flex items-center gap-4 text-xs text-gray-400 italic">
                        <span>${article.author}</span>
                        <span>•</span>
                        <span>${article.readTime[currentLang] || article.readTime['en']}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Initialize lucide
        lucide.createIcons();
        
        // Initial render
        renderJournal();

        // Listen for language changes from main script.js
        window.addEventListener('goyoga_language_changed', renderJournal);
    </script>
</body>
</html>

        :root {
            --brand-pink: #ec4899;
            --brand-dark: #282420;
            --bg-light: #FAF9F6;

        body {
            background-color: var(--bg-light);
            background-image: 
                radial-gradient(at 0% 0%, rgba(236, 72, 153, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.05) 0px, transparent 50%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: var(--brand-dark);
            -webkit-font-smoothing: antialiased;
        }

        .card-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            padding: 0 0 100px 0; /* Space for sticky button */
        }

        .main-card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            margin-top: 80px;
            position: relative;
            z-index: 10;
        }

        .profile-header {
            height: 120px;
            background: linear-gradient(135deg, #ec4899 0%, #be185d 100%);
            border-radius: 2rem 2rem 0 0;
            position: relative;
        }

        .profile-img-container {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 5px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
        }

        .info-item {
            display: flex;
            align-items: center;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid rgba(0,0,0,0.03);
            transition: background-color 0.2s;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-item:active {
            background-color: #f9fafb;
        }

        .icon-box {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F05A5A; /* Warm reddish-pink from Blinq reference */
            border-radius: 50%;
            color: white;
            flex-shrink: 0;
            margin-right: 1rem;
        }

        .sticky-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem;
            background: linear-gradient(to top, var(--bg-light) 80%, transparent);
            z-index: 50;
            display: flex;
            justify-content: center;
        }

        .save-button {
            background: #F05A5A;
            color: white;
            padding: 1rem 3rem;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 1.125rem;
            box-shadow: 0 10px 15px -3px rgba(240, 90, 90, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
            max-width: 320px;
            justify-content: center;
        }

        .save-button:active {
            transform: scale(0.96);
        }

        .qr-section {
            padding: 2.5rem 1.5rem;
            border-top: 8px solid var(--bg-light);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Animation */
        .fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>

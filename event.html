<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details | GoYoga Tallinn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfbf9; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .gallery-grid img { cursor: zoom-in; transition: transform 0.3s ease; }
        .gallery-grid img:hover { transform: scale(1.02); }
    </style>
</head>
<body class="text-gray-900 pt-24">

    <!-- Navbar (Aligned with index.html) -->
    <header id="navbar" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 bg-white shadow-sm">
        <div class="container-custom py-4 md:py-5">
            <div class="flex items-center justify-between">
                <a href="index.html" class="text-2xl font-serif font-medium tracking-wide">GoYoga</a>
                <nav class="hidden md:block">
                    <ul class="flex items-center space-x-8">
                        <li><a href="index.html#home" class="text-sm font-medium link-underline" data-i18n="nav.home">Home</a></li>
                        <li><a href="events.html" class="text-sm font-medium link-underline text-pink-600" data-i18n="nav.events">Events</a></li>
                        <li><a href="index.html#contact" class="text-sm font-medium link-underline" data-i18n="nav.contact">Contact</a></li>
                    </ul>
                </nav>
                <button onclick="window.history.back()" class="flex items-center gap-2 text-sm font-medium text-gray-500 hover:text-pink-600 transition-colors">
                    <i data-lucide="arrow-left" class="h-4 w-4"></i>
                    <span data-i18n="classes.back_to_classes">Back</span>
                </button>
            </div>
        </div>
    </header>

    <main id="event-detail-content" class="pb-24">
        <!-- Dynamic Content Loader -->
        <div class="container-custom flex justify-center py-24">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-pink-600"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-12">
        <div class="container-custom text-center">
            <p class="text-gray-400 text-sm" data-i18n="footer.copyright">© 2025 GoYoga.ee. All rights reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/events.js"></script>
    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const eventId = params.get('id');
            const lang = localStorage.getItem('preferredLanguage') || 'en';
            const container = document.getElementById('event-detail-content');

            const event = eventsData.find(e => e.id === eventId);

            if (!event) {
                container.innerHTML = `
                    <div class="container-custom py-24 text-center">
                        <h1 class="text-4xl mb-4">Event Not Found</h1>
                        <p class="mb-8 text-gray-500">The event you are looking for might have expired or been moved.</p>
                        <a href="events.html" class="px-8 py-3 bg-gray-900 text-white rounded-full uppercase tracking-widest text-sm font-bold">View All Events</a>
                    </div>
                `;
                return;
            }

            const data = event[lang] || event['en'];
            const typeLabel = event.type === 'retreat' 
                ? (lang === 'et' ? 'Retriit' : lang === 'fi' ? 'Retriitti' : 'Retreat')
                : (lang === 'et' ? 'Sündmus' : lang === 'fi' ? 'Tapahtuma' : 'Event');
            
            const countryLabel = (event.type === 'retreat' && event.category === 'abroad' && event.country)
                ? event.country[lang] || event.country['en']
                : (event.category === 'estonia' ? (lang === 'et' ? 'Eesti' : lang === 'fi' ? 'Viro' : 'Estonia') : '');

            let itineraryHtml = '';
            if (data.itinerary && data.itinerary.length > 0) {
                itineraryHtml = `
                    <div class="mt-16">
                        <h2 class="text-3xl mb-8">Itinerary</h2>
                        <div class="space-y-6">
                            ${data.itinerary.map(item => `
                                <div class="flex gap-6 pb-6 border-b border-gray-100 last:border-0">
                                    <span class="font-bold text-pink-600 min-w-[80px] uppercase tracking-tighter text-sm pt-0.5">${item.day}</span>
                                    <p class="text-gray-700">${item.activity}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            let galleryHtml = '';
            if (event.gallery && event.gallery.length > 0) {
                galleryHtml = `
                    <div class="mt-16">
                        <h2 class="text-3xl mb-8">Atmosphere</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 gallery-grid">
                            ${event.gallery.map(img => `
                                <div class="aspect-video md:aspect-square overflow-hidden rounded-xl bg-gray-100">
                                    <img src="${img}" class="w-full h-full object-cover" alt="Event preview">
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            container.innerHTML = `
                <!-- Hero -->
                <div class="relative w-full h-[60vh] md:h-[70vh] overflow-hidden">
                    <img src="${event.image}" class="w-full h-full object-cover" alt="${data.title}">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
                    <div class="absolute bottom-0 left-0 w-full p-8 md:p-16">
                        <div class="container-custom">
                            <div class="flex flex-col gap-4 max-w-4xl">
                                <div class="flex flex-wrap gap-2">
                                    <span class="px-3 py-1 bg-pink-600 text-white text-xs font-bold uppercase tracking-widest rounded-full">${typeLabel}</span>
                                    ${countryLabel ? `<span class="px-3 py-1 bg-white/20 backdrop-blur-md text-white border border-white/30 text-xs font-bold uppercase tracking-widest rounded-full">${countryLabel}</span>` : ''}
                                </div>
                                <h1 class="text-4xl md:text-6xl lg:text-7xl text-white font-medium leading-tight">${data.title}</h1>
                                <div class="flex flex-wrap items-center gap-6 text-white/90 font-medium">
                                    <div class="flex items-center gap-2">
                                        <i data-lucide="calendar" class="h-5 w-5 text-pink-400"></i>
                                        <span>${data.date}</span>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <i data-lucide="map-pin" class="h-5 w-5 text-pink-400"></i>
                                        <span>${data.location}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="container-custom mt-12 md:mt-16">
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-16">
                        <!-- Left Column: Details -->
                        <div class="lg:col-span-2">
                            <div class="prose prose-lg max-w-none text-gray-700 leading-relaxed italic border-l-4 border-pink-100 pl-6 mb-12">
                                ${data.description}
                            </div>
                            
                            <div class="text-lg text-gray-800 leading-relaxed mb-12">
                                ${data.fullDescription || ''}
                            </div>

                            ${itineraryHtml}
                            ${galleryHtml}
                        </div>

                        <!-- Right Column: Sidebar -->
                        <div class="lg:col-span-1">
                            <div class="sticky top-32 p-8 bg-white border border-gray-100 rounded-3xl shadow-sm space-y-8">
                                <div>
                                    <h3 class="text-xl mb-6">Highlights</h3>
                                    <ul class="space-y-4">
                                        ${data.highlights.map(h => `
                                            <li class="flex items-start gap-3 text-gray-600">
                                                <i data-lucide="check-circle-2" class="h-5 w-5 text-green-500 shrink-0 mt-0.5"></i>
                                                <span>${h}</span>
                                            </li>
                                        `).join('')}
                                    </ul>
                                </div>

                                <div class="pt-8 border-t border-gray-50 flex flex-col gap-4">
                                    <a href="${event.registerLink}" class="w-full py-4 bg-gray-900 text-white text-center font-bold uppercase tracking-widest rounded-xl hover:bg-pink-600 transition-all shadow-md">
                                        Register Now
                                    </a>
                                    <button onclick="shareEvent('${event.id}', '${data.title}')" class="w-full py-4 border border-gray-200 text-gray-700 flex items-center justify-center gap-2 font-bold uppercase tracking-widest rounded-xl hover:bg-gray-50 transition-all">
                                        <i data-lucide="share-2" class="h-4 w-4"></i>
                                        Share Event
                                    </button>
                                </div>

                                <div class="pt-4 text-center">
                                    <p class="text-sm text-gray-400 font-mono">${data.organizer}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            if (window.lucide) window.lucide.createIcons();
            
            // Re-run i18n for the static parts
            updateUI(lang);
        });
    </script>
</body>
</html>

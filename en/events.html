<script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('all-events-container');
            const btns = document.querySelectorAll('.filter-btn');

            function updateEventsListing(category = 'all') {
                const lang = localStorage.getItem('preferredLanguage') || 'en';
                const now = new Date();
                const todayStr = now.toDateString();

                const tomorrow = new Date(now);
                tomorrow.setDate(now.getDate() + 1);
                const tomorrowStr = tomorrow.toDateString();

                const yesterday = new Date(now);
                yesterday.setDate(now.getDate() - 1);
                const yesterdayStr = yesterday.toDateString();

                let events = eventsData.filter(event => {
                    const expiryDate = new Date(event.expiryDate);
                    // Persist for an additional 24 hours after expiry (48h after event start)
                    const disappearAt = new Date(expiryDate.getTime() + 24 * 60 * 60 * 1000);
                    const isHidden = now > disappearAt;
                    const matchesCategory = category === 'all' || event.type === category;
                    return event.active && !isHidden && matchesCategory;
                });

                if (events.length === 0) {
                    container.innerHTML = `<div class="col-span-full py-32 text-center bg-white rounded-3xl border border-dashed border-gray-200"><p class="text-gray-400 font-medium">No upcoming ${category === 'all' ? 'events' : category + 's'} found at the moment.</p></div>`;
                    return;
                }

                container.innerHTML = events.map(event => {
                    const data = event[lang] || event['en'];
                    const typeLabel = event.type === 'retreat'
                        ? (lang === 'et' ? 'Retriit' : lang === 'fi' ? 'Retriitti' : 'Retreat')
                        : (lang === 'et' ? 'Sündmus' : lang === 'fi' ? 'Tapahtuma' : 'Event');
                    const categoryLabel = event.category === 'estonia'
                        ? (lang === 'et' ? 'Eestis' : lang === 'fi' ? 'Virossa' : 'Estonia')
                        : '';
                    const countryLabel = (event.type === 'retreat' && event.category === 'abroad' && event.country)
                        ? event.country[lang] || event.country['en']
                        : '';

                    // Calculate Status Tag
                    const expiryDate = new Date(event.expiryDate);
                    const eventDate = new Date(expiryDate.getTime() - 24 * 60 * 60 * 1000);
                    const eventDateStr = eventDate.toDateString();

                    let statusTag = '';
                    const t = translationsData[lang];

                    if (eventDateStr === todayStr) {
                        statusTag = `<span class="px-4 py-1.5 bg-green-500 shadow-lg text-[10px] font-bold uppercase tracking-widest text-white rounded-full animate-pulse">${t['events.status.today']}</span>`;
                    } else if (eventDateStr === tomorrowStr) {
                        statusTag = `<span class="px-4 py-1.5 bg-blue-500 shadow-lg text-[10px] font-bold uppercase tracking-widest text-white rounded-full">${t['events.status.tomorrow']}</span>`;
                    } else if (eventDateStr === yesterdayStr) {
                        statusTag = `<span class="px-4 py-1.5 bg-gray-500 shadow-lg text-[10px] font-bold uppercase tracking-widest text-white rounded-full">${t['events.status.passed']}</span>`;
                    }

                    return `
                        <div id="${event.id}" class="bg-white rounded-[2rem] overflow-hidden shadow-sm transition-all duration-300 hover:shadow-xl hover:-translate-y-1 flex flex-col h-full border border-gray-100 group">
                            <div class="relative h-72 overflow-hidden">
                                <img src="${event.cardImage || event.image}" alt="${data.title}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                                <div class="absolute top-6 left-6 flex flex-col gap-2">
                                    ${statusTag}
                                    <span class="px-4 py-1.5 bg-white shadow-lg text-[10px] font-bold uppercase tracking-widest text-pink-600 rounded-full">${typeLabel}</span>
                                    ${categoryLabel ? `<span class="px-4 py-1.5 bg-gray-900 shadow-lg text-[10px] font-bold uppercase tracking-widest text-white rounded-full">${categoryLabel}</span>` : ''}
                                    ${countryLabel ? `<span class="px-4 py-1.5 bg-pink-500 shadow-lg text-[10px] font-bold uppercase tracking-widest text-white rounded-full">${countryLabel}</span>` : ''}
                                </div>
                                <button onclick="shareEvent('${event.id}', '${data.title}')" class="absolute top-6 right-6 p-3 bg-white/90 backdrop-blur-md rounded-full text-gray-700 hover:text-pink-600 transition-all shadow-lg">
                                    <i data-lucide="share-2" class="h-4 w-4"></i>
                                </button>
                            </div>
                            <div class="p-8 flex flex-col flex-grow">
                                <div class="flex items-center text-xs text-pink-500 mb-4 font-bold uppercase tracking-widest">
                                    <i data-lucide="calendar" class="h-3.5 w-3.5 mr-2"></i>
                                    <span>${data.date}</span>
                                </div>
                                <h3 class="text-2xl font-medium mb-3 group-hover:text-pink-600 transition-colors leading-tight">${data.title}</h3>
                                <p class="text-sm text-gray-500 mb-6 italic">${data.organizer}</p>
                                <p class="text-gray-600 mb-8 text-sm leading-relaxed line-clamp-3">${data.description}</p>
                                <div class="mt-auto flex flex-col gap-3">
                                    <button onclick="openEventModal('${event.id}', '${encodeURIComponent(data.title)}')" class="w-full text-center py-4 bg-gray-900 text-white text-[10px] font-bold uppercase tracking-[0.2em] rounded-xl hover:bg-pink-600 transition-all duration-300 shadow-md">
                                        ${translationsData[lang]['events.register_button']}
                                    </button>
                                    <a href="event.html?id=${event.id}" class="w-full text-center py-4 border border-gray-200 text-gray-700 text-[10px] font-bold uppercase tracking-[0.2em] rounded-xl hover:bg-gray-50 transition-all">
                                        ${translationsData[lang]['events.learn_more_button']}
                                    </a>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                if (window.lucide) window.lucide.createIcons();
            }

            btns.forEach(btn => {
                btn.addEventListener('click', () => {
                    btns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    updateEventsListing(btn.dataset.category);
                });
            });

            // Initial load
            updateEventsListing();

            // Listen for language changes from script.js
            document.addEventListener('languageChanged', (e) => {
                updateEventsListing(document.querySelector('.filter-btn.active').dataset.category);
            });
        });
    </script>

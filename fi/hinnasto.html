<script>
        document.addEventListener('DOMContentLoaded', () => {
            renderOffersPage();

            document.addEventListener('languageChanged', (e) => {
                renderOffersPage();
            });
        });

        function renderOffersPage() {
            const lang = currentLanguage || 'en';
            const data = offersData[lang] || offersData['en'];

            // Hero
            document.getElementById('offers-hero-tagline').textContent = data.hero.tagline;
            document.getElementById('offers-hero-title').textContent = data.hero.title;
            document.getElementById('offers-hero-description').textContent = data.hero.description;

            // Footer Note
            document.getElementById('offers-footer-note').textContent = data.footer.note;

            const container = document.getElementById('offers-container');
            container.innerHTML = '';

            if (data.current && data.current.items && data.current.items.length > 0) {
                // Render Section Title
                const sectionTitle = document.createElement('h2');
                sectionTitle.className = "text-3xl font-serif text-center mb-10";
                sectionTitle.textContent = data.current.title;
                container.appendChild(sectionTitle);

                // Render Grid
                const grid = document.createElement('div');
                grid.className = "flex flex-col items-center gap-10";

                data.current.items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = "bg-white p-8 md:p-10 rounded-3xl shadow-xl relative overflow-hidden flex flex-col w-full max-w-2xl ring-1 ring-pink-100 transition-all hover:shadow-2xl";

                    let benefitsHtml = '';
                    if (item.benefits && item.benefits.length > 0) {
                        benefitsHtml = `
                            <div class="mb-8 p-6 bg-pink-50/50 rounded-2xl border border-pink-100/50">
                                <h4 class="text-sm font-bold text-stone-900 mb-4 uppercase tracking-wider flex items-center">
                                    <i data-lucide="sparkles" class="h-4 w-4 mr-2 text-pink-500"></i>
                                    ${item.benefitsTitle}
                                </h4>
                                <ul class="space-y-3">
                                    ${item.benefits.map(b => `
                                        <li class="flex items-start">
                                            <i data-lucide="check-circle-2" class="h-5 w-5 mr-3 text-pink-500 flex-shrink-0 mt-0.5"></i>
                                            <span class="text-stone-700 text-[15px] leading-relaxed">${b}</span>
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                        `;
                    }

                    // Render card content
                    card.innerHTML = `
                        <!-- Savings Badge -->
                        <div class="absolute top-0 right-0 bg-pink-500 text-white px-5 py-2 rounded-bl-2xl font-bold text-sm shadow-md tracking-wide">
                            ${item.savings}
                        </div>
                        
                        <!-- Header -->
                        <div class="flex flex-col mb-6 pt-2">
                            <h3 class="text-3xl font-serif font-bold text-stone-900 mb-4">${item.name}</h3>
                            <div class="flex flex-col mb-4">
                                <div class="flex items-baseline space-x-3">
                                    <span class="text-5xl font-bold text-stone-900">${item.price}</span>
                                    <span class="text-xl line-through text-stone-400 font-medium">${item.originalPrice}</span>
                                </div>
                            </div>
                            <p class="text-stone-600 italic leading-relaxed text-lg">"${item.desc}"</p>
                        </div>
                        
                        ${benefitsHtml}
                        
                        <!-- Footer Section -->
                        <div class="mt-auto pt-2">
                            <div class="mb-8 p-5 bg-rose-50 rounded-2xl border border-rose-100 flex flex-col md:flex-row items-center justify-between gap-4">
                                <div class="flex items-center w-full md:w-auto text-xs text-stone-500 uppercase tracking-widest font-medium">
                                    <i data-lucide="clock" class="h-4 w-4 mr-2 text-rose-400"></i>
                                    <span>Expires: ${item.expires}</span>
                                </div>
                                ${item.targetDate ? `
                                <div class="flex space-x-3 text-rose-900 font-mono font-bold text-xl leading-none countdown-timer" data-target="${item.targetDate}">
                                    <div class="flex flex-col items-center bg-white px-3 py-2 rounded-lg shadow-sm w-16"><span class="off-days">00</span><span class="text-[9px] uppercase font-sans font-medium text-rose-500 mt-1">Days</span></div>
                                    <div class="flex items-center text-rose-300 -mx-1">:</div>
                                    <div class="flex flex-col items-center bg-white px-3 py-2 rounded-lg shadow-sm w-16"><span class="off-hours">00</span><span class="text-[9px] uppercase font-sans font-medium text-rose-500 mt-1">Hrs</span></div>
                                </div>
                                ` : ''}
                            </div>
                            
                            <a href="index.html#contact" class="block w-full py-4 text-center bg-gradient-to-r from-pink-600 to-rose-500 text-white rounded-xl font-bold text-lg hover:shadow-[0_8px_30px_rgb(225,29,72,0.3)] transition-all transform hover:-translate-y-1">
                                ${item.claimBtn}
                            </a>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                container.appendChild(grid);
            } else {
                // Render Standby Message
                container.innerHTML = `
                    <div class="text-center py-20 px-6 bg-white rounded-3xl border border-stone-100 shadow-sm max-w-2xl mx-auto">
                        <i data-lucide="wind" class="h-16 w-16 text-stone-200 mx-auto mb-6"></i>
                        <h2 class="text-2xl font-serif text-stone-800 mb-4">${data.standby.title}</h2>
                        <p class="text-stone-500 italic leading-relaxed">${data.standby.message}</p>
                    </div>
                `;
            }

            if (window.lucide) window.lucide.createIcons();

            // Add countdown timer
            if (window.offersInterval) clearInterval(window.offersInterval);
            const timers = document.querySelectorAll('.countdown-timer');
            if (timers.length > 0) {
                window.offersInterval = setInterval(() => {
                    const now = new Date().getTime();
                    timers.forEach(timer => {
                        const targetDate = new Date(timer.getAttribute('data-target')).getTime();
                        const distance = targetDate - now;

                        const daysEl = timer.querySelector('.off-days');
                        const hoursEl = timer.querySelector('.off-hours');

                        if (distance < 0) {
                            if (daysEl) daysEl.innerText = "00";
                            if (hoursEl) hoursEl.innerText = "00";
                            return;
                        }

                        if (daysEl) daysEl.innerText = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
                        if (hoursEl) hoursEl.innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
                    });
                }, 1000);
            }
        }
    </script>

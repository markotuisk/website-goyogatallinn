                <div class="flex items-center gap-4">
                    <!-- Mobile Language Switcher -->

                        <button class="flex items-center gap-2 text-sm font-medium" id="mobile-language-toggle">
                            <img alt="English" class="language-flag" id="mobile-current-flag" src="https://flagcdn.com/w20/gb.png" title="English"/>
                            <span id="mobile-current-language">EN</span>
                        </button>
                        <div class="language-dropdown" id="mobile-language-dropdown">
                            <div class="language-option-mobile active" data-lang="en">
                                <img alt="English" class="language-flag" src="https://flagcdn.com/w20/gb.png" title="English"/>
                                <span>English</span>
                            </div>
                            <div class="language-option-mobile" data-lang="et">
                                <img alt="Eesti" class="language-flag" src="https://flagcdn.com/w20/ee.png" title="Eesti"/>

                            </div>
                            <div class="language-option-mobile" data-lang="fi">
                                <img alt="Suomi" class="language-flag" src="https://flagcdn.com/w20/fi.png" title="Suomi"/>
                                <span>Suomi</span>

                            <div class="language-option-mobile" data-lang="ru">
                                <img alt="Русский" class="language-flag" src="https://flagcdn.com/w20/ru.png" title="Русский">

                    <!-- Mobile Menu Button -->

            </div>

    </header>

    <!-- Mobile Menu Container (for consistency) -->
    <div class="fixed inset-0 z-50 bg-white transform translate-x-full transition-transform duration-300 ease-in-out md:hidden overflow-y-auto" id="mobile-menu">
        <div class="flex justify-end p-4">
            <button class="focus:outline-none" id="menu-close">
                <i class="h-6 w-6" data-lucide="x"></i>
            </button>
        </div>
        <div class="flex flex-col h-full justify-center items-center space-y-8 p-8">
            <a class="mobile-link text-xl font-medium" href="/fi/" data-i18n="nav.home">Home</a>
            <a class="mobile-link text-xl font-medium" href="/fi/#classes" data-i18n="nav.classes">Classes</a>
            <a class="mobile-link text-xl font-medium" href="/fi/#schedule" data-i18n="nav.schedule">Schedule</a>
            <a class="mobile-link text-xl font-medium" href="/fi/tapahtumat" data-i18n="nav.events">Events</a>
            <a class="mobile-link text-xl font-medium text-pink-600" href="/fi/arkisto/" data-i18n="nav.journal">Journal</a>
            <a class="mobile-link text-xl font-medium" href="/fi/#contact" data-i18n="nav.contact">Contact</a>
            
            <!-- Mobile Language Options in Menu -->
            <div class="flex flex-col gap-4 mt-8 border-t pt-8 w-full">
                <div class="text-center mb-2 text-gray-500 font-medium" data-i18n="nav.language">Language</div>
                <div class="flex flex-wrap justify-center gap-3">
                    <button class="language-option-mobile flex items-center gap-2 px-4 py-2 rounded-lg border active" data-lang="en">
                        <img alt="English" class="language-flag" src="https://flagcdn.com/w20/gb.png" title="English"/>
                        <span>English</span>
                    </button>
                    <button class="language-option-mobile flex items-center gap-2 px-4 py-2 rounded-lg border" data-lang="et">
                        <img alt="Eesti" class="language-flag" src="https://flagcdn.com/w20/ee.png" title="Eesti"/>
                        <span>Eesti</span>
                    </button>
                    <button class="language-option-mobile flex items-center gap-2 px-4 py-2 rounded-lg border" data-lang="fi">
                        <img alt="Suomi" class="language-flag" src="https://flagcdn.com/w20/fi.png" title="Suomi"/>

                    </button>
                    <button class="language-option-mobile flex items-center gap-2 px-4 py-2 rounded-lg border" data-lang="ru">
                        <img alt="Русский" class="language-flag" src="https://flagcdn.com/w20/ru.png" title="Русский">
                        <span>Русский</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <main class="pt-32 pb-24">
        <!-- Hub Search / Info (Optional, but good for SEO) -->
        <div id="journal-hub">
            <!-- Hero / Featured Article -->
            <div class="container-custom mb-20 animate-fade-in" id="featured-article-container">
                <!-- Dynamically Injected Heightened Hero -->
            </div>

            <!-- Article Grid -->
            <div class="container-custom grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12" id="article-grid">
                <!-- Dynamically Injected Article Cards -->
            </div>
        </div>

        <!-- Individual Article View (Hidden by default) -->
        <div id="article-detail" class="hidden animate-fade-in">
            <!-- Dynamically Injected Article Content -->
        </div>
    </main>

    <!-- Footer (Synchronized with main site) -->
    <footer class="bg-gray-800 text-white pt-20 pb-10">
        <div class="container-custom text-center">
            <img alt="Goyoga Tallinn" class="h-12 w-auto mx-auto mb-8 brightness-0 invert" src="/assets/branding/logo-goyoga-tallinn-estonia.svg">
            <p class="text-gray-400 max-w-md mx-auto mb-10" data-i18n="footer.description">Estonia's leading yoga and wellness sanctuary.</p>
            <div class="border-t border-gray-700 pt-8 text-sm text-gray-500">
                <p data-i18n="footer.copyright">© 2026 Goyoga Estonia OÜ. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="/js/script.js"></script>
    <script>
        // Router & High-Level State
        function handleRouting() {
            const params = new URLSearchParams(window.location.search);
            const articleId = params.get('id');
            const hub = document.getElementById('journal-hub');
            const detail = document.getElementById('article-detail');

            if (articleId && window.journalData) {
                const article = window.journalData.articles.find(a => a.id === articleId);
                if (article) {
                    hub.classList.add('hidden');
                    detail.classList.remove('hidden');
                    renderArticleDetail(article);
                    window.scrollTo(0, 0);
                    return;
                }
            }

            // Fallback to Hub
            hub.classList.remove('hidden');
            detail.classList.add('hidden');
            renderJournal();
        }

        function navigateToArticle(id) {
            const url = new URL(window.location);
            url.searchParams.set('id', id);
            window.history.pushState({ id }, '', url);
            handleRouting();
        }

        function backToHub() {
            const url = new URL(window.location);
            url.searchParams.delete('id');
            window.history.pushState({}, '', url);
            handleRouting();
        }

        function renderJournal() {
            const currentLang = window.currentLanguage || document.documentElement.lang || 'en';
            const grid = document.getElementById('article-grid');
            const featured = document.getElementById('featured-article-container');
            
            // Reset SEO to Hub defaults
            const hubSeo = (seoData.journal && seoData.journal[currentLang]) || (seoData.journal && seoData.journal['en']) || {};
            document.title = hubSeo.title || "The Journal | Goyoga Tallinn";
            document.getElementById('meta-description')?.setAttribute('content', hubSeo.description || "");
            document.getElementById('og-title')?.setAttribute('content', hubSeo.ogTitle || hubSeo.title || "");
            document.getElementById('og-description')?.setAttribute('content', hubSeo.ogDescription || hubSeo.description || "");
            document.getElementById('og-image')?.setAttribute('content', "https://www.goyoga.ee/assets/branding/og-journal.jpg");
            document.getElementById('og-url')?.setAttribute('content', window.location.origin + window.location.pathname);

            if (!window.journalData) return;
            const articles = window.journalData.articles;
            
            // 1. Featured
            const first = articles[0];
            const firstTrans = first.translations[currentLang] || first.translations['en'];
            featured.innerHTML = `
                <div onclick="navigateToArticle('${first.id}')" class="relative rounded-[2.5rem] overflow-hidden group cursor-pointer shadow-2xl h-[500px] lg:h-[600px] bg-stone-900">
                    <img src="${first.image}" class="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:scale-105 transition-transform duration-[2s]" />
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
                    <div class="absolute bottom-0 left-0 p-8 md:p-16 max-w-4xl">
                        <span class="inline-block px-4 py-1.5 bg-pink-600 text-white text-[10px] font-bold tracking-[0.2em] uppercase rounded-full mb-6">${first.category[currentLang] || first.category['en']}</span>
                        <h1 class="text-4xl md:text-5xl font-serif font-medium text-white mb-6 leading-tight">${firstTrans.title}</h1>
                        <p class="text-xl text-gray-200 mb-8 line-clamp-2">${firstTrans.excerpt}</p>
                        <div class="flex flex-wrap items-end justify-between gap-4">
                            <div class="space-y-2">
                                <div class="flex items-center gap-4 text-white/80 text-sm italic">
                                    <span>${first.author}</span>
                                    <span>•</span>
                                    <span>${first.date.split('-').reverse().join('.')}</span>
                                </div>
                            ${first.photographer ? `<div class="text-white/60 text-[10px] italic tracking-wide">PHOTO: ${first.photographer.name.toUpperCase()} ${first.photographer.date?.toUpperCase() || ''}</div>` : ''}
                        </div>
                        <div class="text-white/20 text-[7px] font-medium tracking-[0.4em] uppercase pb-1">The Goyoga Tallinn Journal</div>
                    </div>
                </div>
            </div>
            `;

            // 2. Grid
            grid.innerHTML = '';
            articles.slice(1).forEach(article => {
                const trans = article.translations[currentLang] || article.translations['en'];
                const card = document.createElement('div');
                card.className = "group cursor-pointer";
                card.onclick = () => navigateToArticle(article.id);
                card.innerHTML = `
                    <div class="rounded-[2rem] overflow-hidden mb-6 aspect-[4/5] bg-stone-200">
                        <img src="${article.image}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                    </div>
                    <span class="text-[10px] font-bold tracking-[0.2em] uppercase text-pink-600 mb-3 block">${article.category[currentLang] || article.category['en']}</span>
                    <h3 class="text-2xl font-serif font-medium mb-4 group-hover:text-pink-600 transition-colors">${trans.title}</h3>
                    <p class="text-gray-500 line-clamp-3 mb-6">${trans.excerpt}</p>
                    <div class="flex items-center gap-4 text-xs text-gray-400 italic">
                        <span>${article.author}</span>
                        <span>•</span>
                        <span>${article.date.split('-').reverse().join('.')}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function shareArticle(title, id) {
            const url = `${window.location.origin}${window.location.pathname}?id=${id}`;
            if (navigator.share) {
                try {
                    await navigator.share({ title, url });
                } catch (err) { console.log('Share failed', err); }
            } else {
                navigator.clipboard.writeText(url);
                alert('Link copied to clipboard');
            }
        }

        function renderArticleDetail(article) {
            const currentLang = window.currentLanguage || document.documentElement.lang || 'en';
            const trans = article.translations[currentLang] || article.translations['en'];
            const container = document.getElementById('article-detail');

            // Update SEO Metadata for Details
            const canonicalUrl = `${window.location.origin}${window.location.pathname}?id=${article.id}`;
            document.title = `${trans.title} | Goyoga Journal`;
            document.getElementById('meta-description').setAttribute('content', trans.excerpt);
            document.getElementById('og-title').setAttribute('content', trans.title);
            document.getElementById('og-description').setAttribute('content', trans.excerpt);
            document.getElementById('og-image').setAttribute('content', article.image);
            document.getElementById('og-url').setAttribute('content', canonicalUrl);

            container.innerHTML = `
                <div class="container-custom max-w-4xl mx-auto">
                    <!-- Navigation Back -->
                    <button onclick="backToHub()" class="flex items-center gap-2 text-pink-600 font-medium mb-12 hover:gap-3 transition-all">
                        <i data-lucide="arrow-left" class="h-4 w-4"></i>
                        <span data-i18n="journal.back">Back to Journal</span>
                    </button>

                    <!-- Article Header -->
                    <header class="mb-12">
                        <div class="mb-6">
                            <span class="inline-block px-4 py-1.5 bg-pink-100 text-pink-600 text-[10px] font-bold tracking-[0.2em] uppercase rounded-full">${article.category[currentLang] || article.category['en']}</span>
                        </div>
                        <h1 class="text-4xl md:text-6xl font-serif font-medium mb-8 leading-tight text-stone-900">${trans.title}</h1>
                        <div class="flex flex-wrap items-center justify-between gap-6 border-y border-stone-200 py-6">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-full bg-pink-50 flex items-center justify-center text-pink-600 font-serif text-xl border border-pink-100">
                                    ${article.author.charAt(0)}
                                </div>
                                <div>
                                    <div class="font-medium text-stone-900">${article.author}</div>
                                    <div class="text-xs text-stone-400 italic flex items-center gap-2">
                                        <span>${article.date.split('-').reverse().join('.')} • ${article.readTime[currentLang] || article.readTime['en']}</span>
                                        <span class="text-stone-300">|</span>
                                        <span class="opacity-70">
                                            ${trans.isOriginal 
                                                ? (currentLang === 'et' ? '(Originaaltekst)' : '(Original Author Text)') 
                                                : (currentLang === 'et' ? '(Tõlge)' : '(Translation)')
                                            }
                                        </span>
                                        ${article.photographer ? `
                                            <span class="text-stone-300">|</span>
                                            <span data-i18n="journal.photo">Photo:</span> 
                                            <a href="${article.photographer.instagram}" target="_blank" class="hover:text-pink-600 transition-colors underline decoration-stone-200 underline-offset-4">${article.photographer.name}</a>
                                        ` : ''}
                                    </div>
                                </div>
                            </div>
                            <button onclick="shareArticle('${trans.title}', '${article.id}')" class="flex items-center gap-2 px-6 py-2 rounded-full border border-stone-200 hover:bg-stone-50 transition-colors text-sm font-medium">
                                <i data-lucide="share-2" class="h-4 w-4"></i>
                                <span data-i18n="journal.share">Share</span>
                            </button>
                        </div>
                    </header>

                    <!-- Featured Image -->
                    <div class="relative rounded-[2.5rem] overflow-hidden mb-16 shadow-xl aspect-video scale-[1.02] -mx-4 md:mx-0">
                        <img src="${article.image}" class="w-full h-full object-cover" />
                        <div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent"></div>
                        <div class="absolute bottom-8 left-8 right-8 flex justify-between items-end">
                            <div class="text-white/80 text-[10px] italic tracking-wide">PHOTO: ${article.photographer?.name.toUpperCase() || ''} ${article.photographer?.date?.toUpperCase() || ''}</div>
                            <div class="text-white/20 text-[7px] font-medium tracking-[0.4em] uppercase">The Goyoga Tallinn Journal</div>
                        </div>
                    </div>


                    <!-- Article Body -->
                    <article class="prose prose-stone prose-lg max-w-none text-stone-700 leading-relaxed font-light">
                        ${trans.content}
                    </article>

                    <!-- Hashtags & Links -->
                    <div class="mt-16 pt-12 border-t border-stone-100">
                        <div class="flex flex-wrap gap-2 mb-12">
                            ${article.hashtags.map(tag => `<span class="text-xs font-medium text-stone-400 bg-stone-50 px-3 py-1 rounded-md border border-stone-100">${tag}</span>`).join('')}
                        </div>
                        
                        <!-- Internal Links Container -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            ${article.teacherId ? `
                                <a href="/teacher.html?id=${article.teacherId}" class="group p-6 rounded-2xl bg-white border border-stone-100 shadow-sm hover:shadow-md transition-all">
                                    <div class="text-[10px] font-bold tracking-[0.2em] uppercase text-stone-400 mb-3" data-i18n="journal.meet_teacher">About the Author</div>
                                    <h4 class="text-lg font-serif font-medium text-stone-900 group-hover:text-pink-600 transition-colors">${article.author}</h4>
                                    <div class="text-sm text-pink-500 mt-1 flex items-center gap-1">
                                        <span data-i18n="journal.view_profile">View Guide Profile</span>
                                        <i data-lucide="arrow-right" class="h-3 w-3"></i>
                                    </div>
                                </a>
                            ` : ''}
                            ${article.practiceId ? `
                                <a href="/class.html?id=${article.practiceId}" class="group p-6 rounded-2xl bg-stone-900 text-white shadow-xl hover:-translate-y-1 transition-all">
                                    <div class="text-[10px] font-bold tracking-[0.2em] uppercase text-white/40 mb-3" data-i18n="journal.explore_practice">Related Practice</div>
                                    <h4 class="text-lg font-serif font-medium capitalize">${article.practiceId} Yoga</h4>
                                    <div class="text-sm text-pink-400 mt-1 flex items-center gap-1">
                                        <span data-i18n="journal.join_class">Start Practicing</span>
                                        <i data-lucide="arrow-right" class="h-3 w-3"></i>
                                    </div>
                                </a>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // Initialize lucide
        lucide.createIcons();
        
        // Initial route check
        handleRouting();

        // Listen for back/forward navigation
        window.onpopstate = handleRouting;

        // Listen for language changes from main script.js
        window.addEventListener('goyoga_language_changed', handleRouting);
    </script>
</body>
</html>

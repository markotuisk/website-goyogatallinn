<script>
        document.addEventListener('DOMContentLoaded', () => {
            renderComparePage();
            document.addEventListener('languageChanged', renderComparePage);
        });

        function renderComparePage() {
            const lang = currentLanguage || 'en';
            const data = (window.compareData && window.compareData[lang]) ? window.compareData[lang] : (window.compareData['en'] || {});

            // Hero
            if (data.hero) {
                const elTag = document.getElementById('compare-hero-tagline');
                const elTitle = document.getElementById('compare-hero-title');
                const elDesc = document.getElementById('compare-hero-description');
                
                if(elTag) elTag.textContent = data.hero.tagline;
                if(elTitle) elTitle.textContent = data.hero.title;
                if(elDesc) elDesc.textContent = data.hero.description;
            }

            const container = document.getElementById('compare-container');
            if(!container || !data.table) return;
            
            container.innerHTML = '';

            const table = document.createElement('table');
            table.className = "w-full text-left border-collapse min-w-[800px]";

            // Render Headers
            const thead = document.createElement('thead');
            thead.className = "bg-stone-100 border-b border-stone-200 text-stone-600 font-medium text-sm tracking-wider uppercase";
            const trHead = document.createElement('tr');
            
            data.table.headers.forEach((headerText, index) => {
                const th = document.createElement('th');
                th.className = "px-6 py-4";
                if(index === 0) th.classList.add('rounded-tl-2xl');
                if(index === data.table.headers.length - 1) th.classList.add('rounded-tr-2xl');
                th.textContent = headerText;
                trHead.appendChild(th);
            });
            thead.appendChild(trHead);
            table.appendChild(thead);

            // Render Body
            const tbody = document.createElement('tbody');
            tbody.className = "divide-y divide-stone-100 bg-white";

            data.table.sections.forEach((section, secIndex) => {
                const trTitle = document.createElement('tr');
                trTitle.className = "bg-stone-50/50";
                const tdTitle = document.createElement('td');
                tdTitle.colSpan = data.table.headers.length;
                tdTitle.className = "px-6 py-4 pt-6 font-serif text-lg font-semibold text-stone-800 text-center border-t border-stone-200";
                tdTitle.textContent = section.title;
                trTitle.appendChild(tdTitle);
                tbody.appendChild(trTitle);

                // Section Description Row (Soft UI)
                if (section.description) {
                    const trDesc = document.createElement('tr');
                    trDesc.className = "bg-stone-50/50";
                    const tdDesc = document.createElement('td');
                    tdDesc.colSpan = data.table.headers.length;
                    tdDesc.className = "px-6 pb-6 text-sm text-stone-500 italic text-center mx-auto max-w-2xl text-wrap leading-relaxed";
                    tdDesc.textContent = section.description;
                    trDesc.appendChild(tdDesc);
                    tbody.appendChild(trDesc);
                }

                // Section Data Rows
                section.rows.forEach((row, rowIndex) => {
                    const tr = document.createElement('tr');
                    tr.className = "transition-colors hover:bg-stone-50 group";
                    
                    row.forEach((cellText, cellIndex) => {
                        const td = document.createElement('td');
                        td.className = "px-6 py-4 text-sm text-stone-600 group-hover:text-stone-900";
                        
                        if (cellIndex === 5) {
                            td.className = "px-6 py-4 text-right";
                            if (cellText) {
                                const btn = document.createElement('a');
                                btn.href = '#';
                                btn.className = "inline-flex items-center justify-center px-5 py-2.5 bg-gradient-to-r from-pink-600 to-rose-500 hover:from-pink-700 hover:to-rose-600 text-white text-xs font-bold uppercase tracking-wider rounded-full transition-all shadow focus:outline-none focus:ring-2 focus:ring-pink-500 whitespace-nowrap hover:-translate-y-0.5 cursor-pointer";
                                btn.textContent = data.buyBtn || "Buy";
                                
                                btn.addEventListener('click', (e) => {
                                    e.preventDefault();
                                    
                                    if (window.pricingData) {
                                        const langPricing = window.pricingData[lang] || window.pricingData['en'];
                                        let foundOpt = null, foundData = null, foundGroup = null;
                                        
                                        for (const [gKey, gVal] of Object.entries(langPricing)) {
                                            if (gVal.options) {
                                                const match = gVal.options.find(o => o.link === cellText);
                                                if (match) {
                                                    foundOpt = match;
                                                    foundData = gVal;
                                                    foundGroup = gKey;
                                                    break;
                                                }
                                            }
                                        }
                                        
                                        if (foundOpt && window.renderInvoiceSummary && window.toggleModal) {
                                            window.renderInvoiceSummary(foundOpt, foundData, foundGroup);
                                            window.toggleModal('pricing-modal', true);
                                            return;
                                        }
                                    }
                                    // Fallback if modal system fails
                                    window.open(cellText, '_blank');
                                });
                                
                                td.appendChild(btn);
                            }
                        } else {
                            if (cellIndex === 0) {
                                td.className = "px-6 py-4 text-base font-medium text-stone-900";
                            }
                            else if (cellIndex === 1) {
                                td.className = "px-6 py-4 text-base font-bold text-pink-600 whitespace-nowrap";
                            }
                            else if (cellIndex === 2) {
                                td.className = "px-6 py-4 text-sm text-stone-500 italic whitespace-nowrap";
                            }

                            td.textContent = cellText;
                        }
                        tr.appendChild(td);
                    });
                    
                    tbody.appendChild(tr);
                });
            });

            table.appendChild(tbody);
            container.appendChild(table);

            if (window.lucide) window.lucide.createIcons();
        }
    </script>

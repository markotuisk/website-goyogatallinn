<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events & Retreats | GoYoga Tallinn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .filter-btn.active {
            background-color: #111827;
            color: white;
            border-color: #111827;
        }
    </style>
</head>

<body class="bg-white text-gray-900 pt-20">

    <!-- Navigation (Simplified for subpages) -->
    <nav id="navbar" class="fixed top-0 left-0 w-full z-50 transition-all duration-300 bg-white shadow-sm py-4">
        <div class="container-custom flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 group">
                <div
                    class="w-10 h-10 bg-pink-600 rounded-lg flex items-center justify-center text-white transition-transform group-hover:rotate-12">
                    <i data-lucide="infinity" class="h-6 w-6"></i>
                </div>
                <span class="text-2xl font-bold tracking-tighter">GOYOGA</span>
            </a>

            <div class="hidden lg:flex items-center gap-8">
                <a href="index.html" class="font-medium hover:text-pink-600 transition-colors"
                    data-i18n="nav.home">Home</a>
                <a href="index.html#studio" class="font-medium hover:text-pink-600 transition-colors"
                    data-i18n="nav.studio">Studio</a>
                <a href="index.html#schedule" class="font-medium hover:text-pink-600 transition-colors"
                    data-i18n="nav.schedule">Schedule</a>
                <a href="index.html#pricing" class="font-medium hover:text-pink-600 transition-colors"
                    data-i18n="nav.pricing">Pricing</a>
                <a href="index.html#teachers" class="font-medium hover:text-pink-600 transition-colors"
                    data-i18n="nav.teachers">Teachers</a>
                <a href="events.html" class="text-pink-600 font-bold" data-i18n="nav.events">Events</a>
                <a href="index.html#contact"
                    class="px-5 py-2.5 bg-gray-900 text-white font-medium rounded-full hover:bg-pink-600 transition-all"
                    data-i18n="nav.contact">Contact</a>
            </div>

            <!-- Language Switcher -->
            <div class="hidden lg:flex items-center gap-2">
                <button id="language-toggle"
                    class="flex items-center gap-2 px-3 py-1.5 border border-gray-200 rounded-full hover:bg-gray-50 transition-all">
                    <img id="current-flag" src="https://flagcdn.com/w20/gb.png" alt="flag"
                        class="w-5 h-auto rounded-sm">
                    <span id="current-language" class="text-sm font-bold uppercase">EN</span>
                    <i data-lucide="chevron-down" class="h-4 w-4 text-gray-400"></i>
                </button>
                <div id="language-dropdown"
                    class="absolute top-16 right-4 lg:right-auto bg-white border border-gray-100 rounded-xl shadow-xl p-2 min-w-[140px] opacity-0 pointer-events-none transition-all duration-200 translate-y-2">
                    <button
                        class="language-option w-full flex items-center gap-3 px-3 py-2.5 hover:bg-gray-50 rounded-lg transition-colors"
                        data-lang="en">
                        <img src="https://flagcdn.com/w20/gb.png" class="w-5 h-auto rounded-sm">
                        <span class="text-sm font-medium">English</span>
                    </button>
                    <button
                        class="language-option w-full flex items-center gap-3 px-3 py-2.5 hover:bg-gray-50 rounded-lg transition-colors"
                        data-lang="et">
                        <img src="https://flagcdn.com/w20/ee.png" class="w-5 h-auto rounded-sm">
                        <span class="text-sm font-medium">Eesti</span>
                    </button>
                    <button
                        class="language-option w-full flex items-center gap-3 px-3 py-2.5 hover:bg-gray-50 rounded-lg transition-colors"
                        data-lang="fi">
                        <img src="https://flagcdn.com/w20/fi.png" class="w-5 h-auto rounded-sm">
                        <span class="text-sm font-medium">Suomi</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Header Section -->
    <section class="py-16 md:py-24 bg-gray-50 border-b border-gray-100">
        <div class="container-custom">
            <div class="max-w-3xl mx-auto text-center">
                <span
                    class="inline-block px-3 py-1 text-xs font-medium tracking-wider uppercase text-pink-700 bg-pink-100 rounded-full mb-4"
                    data-i18n="events.tagline">Deepen Your Practice</span>
                <h1 class="text-4xl md:text-5xl font-medium mb-6" data-i18n="events.title">Upcoming Events & Retreats
                </h1>
                <p class="text-lg text-gray-500" data-i18n="events.description">Join us for special workshops and
                    immersive retreats designed to expand your knowledge and rejuvenate your spirit.</p>
            </div>
        </div>
    </section>

    <!-- Filter & List Section -->
    <section class="py-16">
        <div class="container-custom">
            <!-- Filter Bar -->
            <div class="flex flex-wrap items-center justify-center gap-3 mb-12">
                <button
                    class="filter-btn active px-6 py-2.5 rounded-full border border-gray-200 text-sm font-medium transition-all hover:border-gray-900"
                    data-category="all">All Happenings</button>
                <button
                    class="filter-btn px-6 py-2.5 rounded-full border border-gray-200 text-sm font-medium transition-all hover:border-gray-900"
                    data-category="studio">Studio Events</button>
                <button
                    class="filter-btn px-6 py-2.5 rounded-full border border-gray-200 text-sm font-medium transition-all hover:border-gray-900"
                    data-category="retreat">Retreats</button>
            </div>

            <!-- Events Grid -->
            <div id="all-events-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Dynamic Events Inserted Here -->
            </div>
        </div>
    </section>

    <!-- Footer (Simplified) -->
    <footer class="bg-gray-900 text-white py-12 border-t border-gray-800">
        <div class="container-custom text-center">
            <p class="text-gray-400 text-sm" data-i18n="footer.copyright">© 2025 GoYoga.ee. All rights reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/events.js"></script>
    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('all-events-container');
            const btns = document.querySelectorAll('.filter-btn');

            function updateEventsListing(category = 'all') {
                const lang = localStorage.getItem('preferredLanguage') || 'en';
                const now = new Date();

                let events = eventsData.filter(event => {
                    const isExpired = event.expiryDate && new Date(event.expiryDate) < now;
                    const matchesCategory = category === 'all' || event.type === category;
                    return event.active && !isExpired && matchesCategory;
                });

                if (events.length === 0) {
                    container.innerHTML = `<p class="col-span-full text-center text-gray-500 py-24">No upcoming ${category === 'all' ? 'events' : category + 's'} found.</p>`;
                    return;
                }

                container.innerHTML = events.map(event => {
                    const data = event[lang] || event['en'];
                    const typeLabel = event.type === 'retreat'
                        ? (lang === 'et' ? 'Retriit' : lang === 'fi' ? 'Retriitti' : 'Retreat')
                        : (lang === 'et' ? 'Sündmus' : lang === 'fi' ? 'Tapahtuma' : 'Event');
                    const categoryLabel = event.category === 'abroad'
                        ? (lang === 'et' ? 'Välismaal' : lang === 'fi' ? 'Ulkomailla' : 'Abroad')
                        : event.category === 'estonia'
                            ? (lang === 'et' ? 'Eestis' : lang === 'fi' ? 'Virossa' : 'Estonia')
                            : '';

                    return `
                        <div id="${event.id}" class="bg-white rounded-xl overflow-hidden shadow-sm transition-all duration-300 hover:shadow-md flex flex-col h-full border border-gray-100 group">
                            <div class="relative h-64 overflow-hidden">
                                <img src="${event.image}" alt="${data.title}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                                <div class="absolute top-4 left-4 flex flex-col gap-2">
                                    <span class="px-3 py-1 bg-white/90 backdrop-blur-sm text-xs font-bold uppercase tracking-widest text-pink-600 rounded-full shadow-sm">${typeLabel}</span>
                                    ${categoryLabel ? `<span class="px-3 py-1 bg-gray-900/80 backdrop-blur-sm text-xs font-bold uppercase tracking-widest text-white rounded-full shadow-sm">${categoryLabel}</span>` : ''}
                                </div>
                            </div>
                            <div class="p-6 flex flex-col flex-grow">
                                <div class="flex items-center text-sm text-pink-500 mb-2 font-semibold">
                                    <i data-lucide="calendar" class="h-4 w-4 mr-2"></i>
                                    <span>${data.date}</span>
                                </div>
                                <h3 class="text-xl font-medium mb-2 group-hover:text-pink-600 transition-colors">${data.title}</h3>
                                <p class="text-sm text-gray-500 mb-4 italic">${data.organizer}</p>
                                <p class="text-gray-600 mb-6 text-sm leading-relaxed">${data.description}</p>
                                <div class="mt-auto flex flex-col gap-3">
                                    <a href="${event.registerLink}" class="w-full text-center py-3.5 bg-gray-900 text-white text-sm font-bold uppercase tracking-widest rounded-lg hover:bg-pink-600 transition-all duration-300">
                                        ${translationsData[lang]['events.register_button']}
                                    </a>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                if (window.lucide) window.lucide.createIcons();

                // Highlight from hash if present
                const hash = window.location.hash;
                if (hash) {
                    const el = document.querySelector(hash);
                    if (el) {
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        el.classList.add('ring-4', 'ring-pink-100');
                    }
                }
            }

            btns.forEach(btn => {
                btn.addEventListener('click', () => {
                    btns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    updateEventsListing(btn.dataset.category);
                });
            });

            // Initial load
            updateEventsListing();

            // Listen for language changes from script.js
            document.addEventListener('languageChanged', (e) => {
                updateEventsListing(document.querySelector('.filter-btn.active').dataset.category);
            });
        });
    </script>
</body>

</html>
